name: Publish to npm

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun run test

      - name: Check if should publish
        id: version-check
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"

          LATEST_VERSION=$(npm view svelte-kit-bun version 2>/dev/null || echo "0.0.0")
          echo "Latest published: $LATEST_VERSION"

          node -e "
            const current = '$CURRENT_VERSION';
            const latest = '$LATEST_VERSION';

            function compareVersions(a, b) {
              const aParts = a.split('.').map(Number);
              const bParts = b.split('.').map(Number);
              for (let i = 0; i < Math.max(aParts.length, bParts.length); i++) {
                const aPart = aParts[i] || 0;
                const bPart = bParts[i] || 0;
                if (aPart > bPart) return 1;
                if (aPart < bPart) return -1;
              }
              return 0;
            }

            if (compareVersions(current, latest) > 0) {
              console.log('Version is newer, will publish');
            } else {
              console.log('Version not newer, skipping publish');
              process.exit(1);
            }
          "

      - name: Publish to npm
        run: npm publish
